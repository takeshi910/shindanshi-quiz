<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中小企業診断士 クイズアプリ Ver.4</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase compat SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script>
        firebase.initializeApp({
            apiKey: "AIzaSyASkdbPM_ULuuvy5RpI4ovkxARt6nYjj6w",
            authDomain: "shindanshi-app.firebaseapp.com",
            projectId: "shindanshi-app",
            storageBucket: "shindanshi-app.firebasestorage.app",
            messagingSenderId: "939768347803",
            appId: "1:939768347803:web:40f3aa2a2e2a27f9b51a3e",
            measurementId: "G-KFG3TJ05HG"
        });
    </script>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background: linear-gradient(135deg, #1e1b4b 0%, #312e81 50%, #4c1d95 100%);
            min-height: 100vh;
        }

        .fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(12px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .option-btn {
            transition: all 0.2s ease;
            border: 2px solid transparent;
        }

        .option-btn:hover:not(:disabled) {
            transform: translateX(4px);
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .animate-spin {
            animation: spin 1s linear infinite;
        }
    </style>
</head>

<body class="p-3 md:p-5 flex items-start justify-center min-h-screen">
    <div id="root" class="w-full max-w-2xl"></div>

    <script type="text/babel">
        // =============================================
        // クイズデータ（経済学・経済政策 全11問）
        // =============================================
        const quizData = [
            {
                id: 1,
                questionText: "第1問\n\n日本の2022年の名目国内総支出の内訳。図中のA〜Cに該当する項目の組み合わせを選べ。",
                options: [
                    { id: "ア", text: "A：民間最終消費支出 B：政府最終消費支出 C：非金融法人企業の総固定資本形成" },
                    { id: "イ", text: "A：政府最終消費支出 B：民間最終消費支出 C：非金融法人企業の総固定資本形成" },
                    { id: "ウ", text: "A：民間最終消費支出 B：一般政府の総固定資本形成 C：非金融法人企業の総固定資本形成" },
                    { id: "エ", text: "A：政府最終消費支出 B：民間最終消費支出 C：一般政府の総固定資本形成" },
                    { id: "オ", text: "A：民間最終消費支出 B：政府最終消費支出 C：一般政府の総固定資本形成" }
                ],
                correctAnswer: "オ",
                explanation: "【正解：オ】日本のGDP支出面の内訳を考えます。GDPで最大の構成要素は「民間最終消費支出」（家計の消費）で約54%を占め、次に「政府最終消費支出」（公務員の人件費・行政サービス等）が約22%。「固定資本形成（設備・建設投資）」の中で最大なのは「非金融法人企業（一般企業）の総固定資本形成」です。A＝民間・B＝政府・C＝非金融法人企業の「オ」が正解です。"
            },
            {
                id: 2,
                questionText: "第2問\n\n日本・米国・韓国・OECD平均の1人当たり労働生産性推移。a〜cの国を選べ。",
                options: [
                    { id: "ア", text: "a：韓国 b：米国 c：日本" },
                    { id: "イ", text: "a：日本 b：韓国 c：米国" },
                    { id: "ウ", text: "a：日本 b：米国 c：韓国" },
                    { id: "エ", text: "a：米国 b：韓国 c：日本" },
                    { id: "オ", text: "a：米国 b：日本 c：韓国" }
                ],
                correctAnswer: "エ",
                explanation: "【正解：エ】米国は他国を大きく上回る最高水準(a)。韓国は2000年代以降急速に上昇し日本を超えており2番手(b)。日本はOECD平均を下回る低水準(c)。「エ：a＝米国、b＝韓国、c＝日本」が正解です。"
            },
            {
                id: 3,
                questionText: "第3問\n\n日本・米国・ユーロ圏の消費者物価（食料・エネルギー除く）推移。a〜cの国・地域を選べ。",
                options: [
                    { id: "ア", text: "a：日本 b：米国 c：ユーロ圏" },
                    { id: "イ", text: "a：米国 b：日本 c：ユーロ圏" },
                    { id: "ウ", text: "a：米国 b：ユーロ圏 c：日本" },
                    { id: "エ", text: "a：ユーロ圏 b：日本 c：米国" },
                    { id: "オ", text: "a：ユーロ圏 b：米国 c：日本" }
                ],
                correctAnswer: "ウ",
                explanation: "【正解：ウ】2022年のインフレ局面：米国が最初に急激に上昇し最大値(a)。ユーロ圏はエネルギー危機等で急騰したが米国より遅く低め(b)。日本はデフレからようやく抜け出す途上で最も低水準(c)。「ウ：a＝米国、b＝ユーロ圏、c＝日本」が正解です。"
            },
            {
                id: 4,
                questionText: "第4問\n\n国民経済計算の考え方として最も適切なものはどれか。",
                options: [
                    { id: "ア", text: "GDPは中間生産物の生産額の合計である。" },
                    { id: "イ", text: "GDPは分配面から要素所得・移転支払・キャピタルゲインに区分される。" },
                    { id: "ウ", text: "高校授業料無償化すると無償化分だけGDPが減少する。" },
                    { id: "エ", text: "子どもが家庭内で家事を担ってもGDPには計上されない。" }
                ],
                correctAnswer: "エ",
                explanation: "【正解：エ】GDPは「市場で取引された財・サービスの付加価値の合計」です。家庭内の家事は市場取引されないためGDPに計上されません（エ：正）。ア：GDPは最終財の付加価値合計で中間財は含みません。イ：GDP分配面はキャピタルゲインを含みません。ウ：授業料無償化は家計支出が政府支出に置き換わるだけでGDP合計は変わりません。"
            },
            {
                id: 5,
                questionText: "第5問\n\nケインズ型消費関数C=a+cYの直線AB。記述の正誤を選べ。\na 所得が大きいほど限界消費性向が小さくなる\nb 所得増加で限界消費性向は一定だが平均消費性向は小さくなる\nc この消費関数の傾きは1より大きい",
                options: [
                    { id: "ア", text: "a：正 b：正 c：誤" },
                    { id: "イ", text: "a：正 b：誤 c：誤" },
                    { id: "ウ", text: "a：誤 b：正 c：正" },
                    { id: "エ", text: "a：誤 b：正 c：誤" },
                    { id: "オ", text: "a：誤 b：誤 c：正" }
                ],
                correctAnswer: "エ",
                explanation: "【正解：エ】ケインズ型消費関数 C＝a＋cY（0＜c＜1）を整理します。a（誤）：限界消費性向＝dC/dY＝c は定数で所得に関わらず一定。b（正）：平均消費性向＝C/Y＝a/Y＋c。Yが増えるとa/Yが縮小するのでAPCは低下します（高所得者ほど貯蓄率が高い）。c（誤）：消費関数の傾きはcで、必ず0＜c＜1です。「エ：a誤・b正・c誤」が正解です。"
            },
            {
                id: 6,
                questionText: "第6問\n\n貨幣需要に関する記述の正誤を選べ。\na 利子率上昇で取引動機による貨幣需要は増加\nb 利子率上昇で資産選択動機の貨幣需要は減少（現金は物価上昇で価値増加）\nc 現金は安全資産なので利子率上昇で資産選択動機の貨幣需要は減少\nd 将来不確実性が高い時、利子率上昇は予備的動機の貨幣需要を増加させる",
                options: [
                    { id: "ア", text: "a：正 b：誤 c：誤 d：正" },
                    { id: "イ", text: "a：誤 b：正 c：正 d：誤" },
                    { id: "ウ", text: "a：誤 b：正 c：誤 d：誤" },
                    { id: "エ", text: "a：誤 b：誤 c：正 d：誤" },
                    { id: "オ", text: "a：誤 b：誤 c：誤 d：正" }
                ],
                correctAnswer: "エ",
                explanation: "【正解：エ】貨幣需要の3動機を整理します。a（誤）：利子率上昇→貨幣保有の機会費用増→取引需要は「減少」。b（誤）：現金は利子を生まず物価上昇で実質価値が下がる。「価値増加」という説明が誤り。c（正）：利子率上昇→債券の魅力増→現金から債券へ→資産選択動機の貨幣需要が「減少」。d（誤）：利子率上昇は予備的需要も抑制します。「エ：c のみ正」が正解です。"
            },
            {
                id: 7,
                questionText: "第7問\n\nY=C+I+G、C=C0+c(Y-T)で、減税の乗数効果を大きくするものはどれか。",
                options: [
                    { id: "ア", text: "基礎消費の増加" },
                    { id: "イ", text: "限界消費性向の上昇" },
                    { id: "ウ", text: "限界貯蓄性向の上昇" },
                    { id: "エ", text: "政府支出の増加" },
                    { id: "オ", text: "投資支出の増加" }
                ],
                correctAnswer: "イ",
                explanation: "【正解：イ】均衡条件を解くと租税乗数＝－c÷(1－c)。乗数の絶対値は c÷(1－c) で、限界消費性向 c が大きいほど分母(1－c)が小さくなり乗数は大きくなります（例：c＝0.8→乗数4、c＝0.9→乗数9）。基礎消費や政府支出・投資は乗数の大きさに影響しません。「イ：限界消費性向の上昇」が正解です。"
            },
            {
                id: 8,
                questionText: "第8問\n\nビルトイン・スタビライザー機能が強い税の組み合わせを選べ。\na 利潤に累進課税する法人所得税\nb 全員に同額の定額税\nc 生活必需品への消費税\nd 一定額まで免除する個人所得税",
                options: [
                    { id: "ア", text: "aとb" },
                    { id: "イ", text: "aとc" },
                    { id: "ウ", text: "aとd" },
                    { id: "エ", text: "bとc" },
                    { id: "オ", text: "bとd" }
                ],
                correctAnswer: "ウ",
                explanation: "【正解：ウ】ビルトイン・スタビライザーとは「景気変動を自動的に和らげる財政の仕組み」です。a（○）：累進的法人所得税は好況時に税収増→民間消費抑制、不況時に税収減→下支え。d（○）：免税付き個人所得税は所得減少時に税負担が軽くなり家計の可処分所得を守ります。一方、b（×）定額税は景気に連動せず、c（×）必需品消費税は消費変動が小さく安定化機能が弱い。「ウ：aとd」が正解です。"
            },
            {
                id: 9,
                questionText: "第9問\n\n為替レート決定に関する記述として最も適切な組み合わせを選べ。\na 輸出増→経常黒字拡大→円高ドル安の圧力\nb 輸出増→経常黒字拡大→円安ドル高の圧力\nc 米国金融資産収益率上昇→日本金融収支赤字→円高ドル安の圧力\nd 米国金融資産収益率上昇→日本金融収支赤字→円安ドル高の圧力",
                options: [
                    { id: "ア", text: "aとc" },
                    { id: "イ", text: "aとd" },
                    { id: "ウ", text: "bとc" },
                    { id: "エ", text: "bとd" }
                ],
                correctAnswer: "イ",
                explanation: "【正解：イ】a（正）：輸出増→ドルを受け取る→受け取ったドルを円に換える（ドル売り・円買い）→円の需要増→「円高」ドル安の圧力。d（正）：米国金融資産の収益率上昇→日本の投資家がドルを買って米国資産に投資→円売りドル買いが増える→「円安」ドル高の圧力。b・c（誤）：上記と逆なので誤り。「イ：aとd」が正解です。"
            },
            {
                id: 10,
                questionText: "第10問\n\n完全資本移動・小国のマンデル=フレミングモデルで政府支出拡大の効果を選べ。\na 固定相場→自国通貨売り介入→貨幣供給増→GDP増\nb 固定相場→自国通貨買い介入→貨幣供給減→GDP減\nc 変動相場→完全クラウディングアウト→GDP増加しない\nd 変動相場→為替減価→GDP増加",
                options: [
                    { id: "ア", text: "aとc" },
                    { id: "イ", text: "aとd" },
                    { id: "ウ", text: "bとc" },
                    { id: "エ", text: "bとd" }
                ],
                correctAnswer: "ア",
                explanation: "【正解：ア】マンデル＝フレミングモデル（完全資本移動・小国）を整理します。a（正）：固定相場制で政府支出拡大→利子率上昇→資本流入→自国通貨高圧力→政府が自国通貨を売り介入→マネーサプライ増→IS効果と合わさりGDP増加が実現。c（正）：変動相場制で政府支出拡大→利子率上昇→資本流入→自国通貨高→純輸出減少→IS曲線右シフト分をちょうど打ち消す（完全クラウドアウト）→GDP変化なし。b・d（誤）：上記と逆。「ア：aとc」が正解です。"
            },
            {
                id: 11,
                questionText: "第11問（設問1）\n\nIS-LM曲線モデル（Y0=完全雇用GDP）。\n（設問1）政府支出増加の長期効果の正誤を選べ。\na 実質GDPを増加させる\nb 物価を上昇させる\nc 利子率を上昇させる",
                options: [
                    { id: "ア", text: "a：正 b：正 c：正" },
                    { id: "イ", text: "a：正 b：正 c：誤" },
                    { id: "ウ", text: "a：正 b：誤 c：誤" },
                    { id: "エ", text: "a：誤 b：正 c：正" },
                    { id: "オ", text: "a：誤 b：正 c：誤" }
                ],
                correctAnswer: "エ",
                explanation: "【正解：エ】長期均衡（物価変動あり）を考えます。政府支出増→IS右シフト→短期GDP増→インフレ→実質貨幣供給(M/P)減→LM左シフト→長期的にGDPはY0に戻ります。a（誤）：実質GDPはY0に戻り増加しません。b（正）：物価は上昇します。c（正）：利子率は上昇したまま高止まりします（財政のクラウドアウト効果）。「エ：a誤・b正・c正」が正解です。"
            }
        ];

        // =============================================
        // ユーティリティ
        // =============================================
        function shuffle(arr) {
            const a = [...arr];
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        // =============================================
        // ローディングスピナー
        // =============================================
        function Spinner() {
            return (
                <div className="flex justify-center items-center py-10">
                    <div className="w-10 h-10 border-4 border-purple-400 border-t-transparent rounded-full animate-spin"></div>
                </div>
            );
        }

        // =============================================
        // スタート画面
        // =============================================
        function StartScreen({ onStart, user, onLogin, onLogout, loadingAuth }) {
            return (
                <div className="fade-in bg-white/10 backdrop-blur-md rounded-2xl p-6 md:p-8 text-white shadow-2xl">
                    <h1 className="text-2xl md:text-3xl font-bold text-center mb-2">
                        📝 中小企業診断士
                    </h1>
                    <p className="text-center text-purple-200 mb-6 text-sm">経済学・経済政策 一問一答</p>

                    {loadingAuth ? (
                        <Spinner />
                    ) : user ? (
                        <div className="mb-6 text-center">
                            <p className="text-purple-200 text-sm mb-1">ログイン中：</p>
                            <p className="font-semibold">{user.email}</p>
                            <button
                                onClick={onLogout}
                                className="mt-2 text-xs text-purple-300 underline hover:text-white"
                            >ログアウト</button>
                        </div>
                    ) : (
                        <div className="mb-6 text-center">
                            <button
                                onClick={onLogin}
                                className="bg-gradient-to-r from-violet-500 to-purple-600 hover:from-violet-600 hover:to-purple-700 text-white px-6 py-2.5 rounded-xl text-sm font-bold transition shadow-lg"
                            >🔑 Googleでログイン</button>
                            <p className="text-xs text-purple-300 mt-2">クイズを始めるにはログインが必要です</p>
                        </div>
                    )}

                    <div className="bg-white/5 rounded-xl p-4 mb-6 text-sm text-purple-100 space-y-1">
                        <p>📚 全 <span className="font-bold text-white">{quizData.length}</span> 問</p>
                        <p>✅ 各問4〜5択の選択式</p>
                        <p>💡 解答後に解説を表示</p>
                    </div>

                    {user ? (
                        <button
                            onClick={onStart}
                            className="w-full bg-gradient-to-r from-violet-500 to-purple-600 hover:from-violet-600 hover:to-purple-700 text-white font-bold py-3 rounded-xl text-lg transition shadow-lg"
                        >
                            スタート 🚀
                        </button>
                    ) : (
                        !loadingAuth && <p className="text-center text-purple-300 text-sm py-2">💡 上のボタンからログインするとスタートできます</p>
                    )}
                </div>
            );
        }

        // =============================================
        // 問題画面
        // =============================================
        function QuestionScreen({ question, qIndex, total, onAnswer, answered, selectedId }) {
            const lines = question.questionText.split("\n").filter(Boolean);
            const title = lines[0];
            const body = lines.slice(1).join("\n");

            function getBtnClass(opt) {
                let base = "option-btn w-full text-left px-4 py-3 rounded-xl text-sm font-medium transition mb-2 ";
                if (!answered) {
                    return base + "bg-white/10 hover:bg-white/20 text-white border-white/20";
                }
                if (opt.id === question.correctAnswer) {
                    return base + "bg-green-500/80 text-white border-green-400";
                }
                if (opt.id === selectedId) {
                    return base + "bg-red-500/70 text-white border-red-400";
                }
                return base + "bg-white/5 text-purple-200 border-transparent";
            }

            return (
                <div className="fade-in bg-white/10 backdrop-blur-md rounded-2xl p-5 md:p-7 text-white shadow-2xl">
                    {/* 進捗 */}
                    <div className="flex justify-between items-center mb-4 text-xs text-purple-200">
                        <span>問題 {qIndex + 1} / {total}</span>
                        <div className="w-40 bg-white/10 rounded-full h-2">
                            <div
                                className="bg-purple-400 h-2 rounded-full transition-all"
                                style={{ width: `${((qIndex + 1) / total) * 100}%` }}
                            />
                        </div>
                    </div>

                    {/* 問題文 */}
                    <div className="mb-5">
                        <p className="font-bold text-base md:text-lg mb-1">{title}</p>
                        {body && <p className="text-sm text-purple-100 whitespace-pre-line">{body}</p>}
                    </div>

                    {/* 選択肢 */}
                    <div>
                        {question.options.map(opt => (
                            <button
                                key={opt.id}
                                className={getBtnClass(opt)}
                                disabled={answered}
                                onClick={() => onAnswer(opt.id)}
                            >
                                <span className="font-bold mr-2">{opt.id}．</span>{opt.text}
                            </button>
                        ))}
                    </div>

                    {/* 解説 */}
                    {answered && (
                        <div className="mt-4 bg-white/5 rounded-xl p-4 text-sm text-purple-100 border border-white/10">
                            <p className="font-bold text-white mb-1">解説</p>
                            <p className="whitespace-pre-line">{question.explanation}</p>
                        </div>
                    )}
                </div>
            );
        }

        // =============================================
        // 結果画面
        // =============================================
        function ResultScreen({ score, total, onRetry, savedOk }) {
            const pct = Math.round((score / total) * 100);
            const msg = pct >= 80 ? "素晴らしい！🎉" : pct >= 60 ? "もう少し！💪" : "復習しましょう📖";

            return (
                <div className="fade-in bg-white/10 backdrop-blur-md rounded-2xl p-6 md:p-8 text-white shadow-2xl text-center">
                    <p className="text-4xl mb-2">{pct >= 80 ? "🏆" : pct >= 60 ? "😊" : "📖"}</p>
                    <h2 className="text-2xl font-bold mb-1">結果発表</h2>
                    <p className="text-purple-200 mb-6">{msg}</p>

                    <div className="bg-white/5 rounded-xl p-6 mb-6">
                        <p className="text-5xl font-bold text-white">{score}<span className="text-2xl text-purple-200"> / {total}</span></p>
                        <p className="text-purple-200 mt-1">正答率 {pct}%</p>
                    </div>

                    {savedOk !== null && (
                        <p className="text-xs text-purple-300 mb-4">
                            {savedOk ? "✅ スコアを保存しました" : "⚠️ スコアの保存に失敗しました"}
                        </p>
                    )}

                    <button
                        onClick={onRetry}
                        className="w-full bg-gradient-to-r from-violet-500 to-purple-600 hover:from-violet-600 hover:to-purple-700 text-white font-bold py-3 rounded-xl text-lg transition shadow-lg"
                    >
                        もう一度挑戦 🔄
                    </button>
                </div>
            );
        }

        // =============================================
        // メインアプリ
        // =============================================
        function App() {
            const { useState, useEffect } = React;

            const [phase, setPhase] = useState("start"); // start | quiz | result
            const [questions, setQuestions] = useState([]);
            const [qIndex, setQIndex] = useState(0);
            const [score, setScore] = useState(0);
            const [answered, setAnswered] = useState(false);
            const [selectedId, setSelectedId] = useState(null);
            const [savedOk, setSavedOk] = useState(null);

            // Firebase Auth
            const [user, setUser] = useState(null);
            const [loadingAuth, setLoadingAuth] = useState(true);

            useEffect(() => {
                const auth = firebase.auth();
                const unsub = auth.onAuthStateChanged(u => {
                    setUser(u);
                    setLoadingAuth(false);
                });
                return () => unsub();
            }, []);

            function handleLogin() {
                const provider = new firebase.auth.GoogleAuthProvider();
                firebase.auth().signInWithPopup(provider).catch(console.error);
            }

            function handleLogout() {
                firebase.auth().signOut();
            }

            function handleStart() {
                const shuffled = shuffle(quizData);
                setQuestions(shuffled);
                setQIndex(0);
                setScore(0);
                setAnswered(false);
                setSelectedId(null);
                setSavedOk(null);
                setPhase("quiz");
            }

            function handleAnswer(optId) {
                if (answered) return;
                setSelectedId(optId);
                setAnswered(true);
                const isCorrect = optId === questions[qIndex].correctAnswer;
                if (isCorrect) setScore(s => s + 1);
            }

            function handleNext() {
                if (qIndex + 1 >= questions.length) {
                    finishQuiz();
                    return;
                }
                setQIndex(i => i + 1);
                setAnswered(false);
                setSelectedId(null);
            }

            async function finishQuiz() {
                setPhase("result");
                if (user) {
                    try {
                        const db = firebase.firestore();
                        await db.collection("scores").add({
                            uid: user.uid,
                            email: user.email,
                            score,
                            total: questions.length,
                            createdAt: firebase.firestore.FieldValue.serverTimestamp()
                        });
                        setSavedOk(true);
                    } catch (e) {
                        console.error(e);
                        setSavedOk(false);
                    }
                }
            }

            if (phase === "start") {
                return (
                    <StartScreen
                        onStart={handleStart}
                        user={user}
                        onLogin={handleLogin}
                        onLogout={handleLogout}
                        loadingAuth={loadingAuth}
                    />
                );
            }

            if (phase === "result") {
                return (
                    <ResultScreen
                        score={score}
                        total={questions.length}
                        onRetry={() => setPhase("start")}
                        savedOk={savedOk}
                    />
                );
            }

            const q = questions[qIndex];

            return (
                <div>
                    <QuestionScreen
                        question={q}
                        qIndex={qIndex}
                        total={questions.length}
                        onAnswer={handleAnswer}
                        answered={answered}
                        selectedId={selectedId}
                    />
                    {answered && (
                        <div className="mt-3 px-1">
                            <button
                                onClick={handleNext}
                                className="w-full bg-white/20 hover:bg-white/30 text-white font-bold py-3 rounded-xl transition"
                            >
                                {qIndex + 1 >= questions.length ? "結果を見る 📊" : "次の問題へ →"}
                            </button>
                        </div>
                    )}
                </div>
            );
        }

        // =============================================
        // DOMContentLoaded 後に React をマウント
        // =============================================
        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
</body>

</html>
